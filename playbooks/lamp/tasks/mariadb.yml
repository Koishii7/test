---
- name: démarrage de mariadb
  service:
    name: mariadb
    state: started
    enabled: true

- name: installation de PyMySQL
  package:
    name: "{{ mariadb.pymysql }}"
    state: present
  
- name: création de la base de données
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: "{{ mariadb.socket }}"

- name: création de l'utilisateur mariadb
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: "{{ mariadb.socket }}"
